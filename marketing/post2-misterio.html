<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post 2 - Manas ASF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #333;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(180deg, #00A8CC 0%, #0E7490 50%, #0E2439 100%);
            border-radius: 0;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 80px 60px;
            color: white;
        }
        
        .emoji-container {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 80px;
        }
        
        .emoji {
            font-size: 100px;
            display: block;
        }
        
        .number-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .number {
            font-size: 150px;
            font-weight: bold;
            background: linear-gradient(to right, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        
        .title-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .title {
            font-size: 48px;
            font-weight: bold;
            line-height: 1.2;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .subtitle-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .subtitle {
            font-size: 22px;
            line-height: 2;
            opacity: 0.95;
        }
        
        .cta-container {
            text-align: center;
            margin-bottom: 120px;
        }
        
        .cta {
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 60px;
        }
        
        .hashtags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .hashtag {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .logo-emoji {
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="emoji-container">
            <span class="emoji">👀</span>
        </div>
        
        <div class="number-container">
            <div class="number">47</div>
        </div>
        
        <div class="title-container">
            <div class="title">Manas Já Sabem...</div>
        </div>
        
        <div class="subtitle-container">
            <div class="subtitle">
                E você? Vai ficar de fora?<br><br>
                Algo especial está sendo criado<br>
                para nós. Para as que surfam.
            </div>
        </div>
        
        <div class="cta-container">
            <div class="cta">Fique atenta. 🏄‍♀️</div>
        </div>
        
        <div class="bottom-section">
            <div class="hashtags">
                <span class="hashtag">#surfgirl</span>
                <span class="hashtag">#surffeminino</span>
                <span class="hashtag">#manas</span>
                <span class="hashtag">#comunidade</span>
                <span class="hashtag">#asf</span>
                <span class="hashtag">#emBreve</span>
            </div>
            
            <div class="logo">
                <span class="logo-emoji">🏄‍♀️</span>
                <span>ASF</span>
            </div>
        </div>
    </div>
</body>
</html>
