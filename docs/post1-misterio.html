<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post 1 - Mistério ASF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #333;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(180deg, #FF6B6B 0%, #E74C3C 50%, #C0392B 100%);
            border-radius: 0;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 80px 60px;
            color: white;
        }
        
        .emoji-container {
            text-align: center;
            margin-bottom: 60px;
            margin-top: 100px;
        }
        
        .emoji {
            font-size: 120px;
            display: block;
        }
        
        .title-container {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .title {
            font-size: 58px;
            font-weight: bold;
            line-height: 1.2;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .subtitle-container {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .subtitle {
            font-size: 24px;
            line-height: 1.8;
            opacity: 0.95;
        }
        
        .cta-container {
            text-align: center;
            margin-bottom: 100px;
        }
        
        .cta {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 60px;
        }
        
        .hashtags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .hashtag {
            background: rgba(255,255,255,0.25);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .logo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .logo-emoji {
            font-size: 32px;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="emoji-container">
            <span class="emoji">🌊</span>
        </div>
        
        <div class="title-container">
            <div class="title">Algo Grande<br>Está Chegando...</div>
        </div>
        
        <div class="subtitle-container">
            <div class="subtitle">
                Uma onda de mudança para todas<br>
                as mulheres que amam o surf.
            </div>
        </div>
        
        <div class="cta-container">
            <div class="cta">Você está pronta? 💪</div>
        </div>
        
        <div class="bottom-section">
            <div class="hashtags">
                <span class="hashtag">#surf</span>
                <span class="hashtag">#surfgirl</span>
                <span class="hashtag">#surffeminino</span>
                <span class="hashtag">#litoralpaulista</span>
                <span class="hashtag">#asf</span>
                <span class="hashtag">#emBreve</span>
            </div>
            
            <div class="logo">
                <span class="logo-emoji">🏄‍♀️</span>
                <span>ASF</span>
            </div>
        </div>
    </div>
</body>
</html>
