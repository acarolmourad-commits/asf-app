<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASF - Lojas de Surf do Litoral Paulista</title>
    <style>
        .shops-filter {
            display: flex;
            gap: 8px;
            padding: 16px;
            overflow-x: auto;
            max-width: 1200px;
            margin: 0 auto;
        }
        .filter-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .shop-card {
            position: relative;
        }
        .shop-badge {
            position: absolute;
            top: 12px;
            right: 12px;
        }
    </style>
</head>
