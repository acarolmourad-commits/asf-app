<script>
// Cookie consent logic
const COOKIE_CONSENT_KEY = 'asf-cookie-consent';

function getCookieConsent() {
  return localStorage.getItem(COOKIE_CONSENT_KEY);
}

function setCookieConsent(level) {
  // level: 'all' | 'essential'
  localStorage.setItem(COOKIE_CONSENT_KEY, level);
  console.log('🍪 Cookie consent set:', level);

  // Track
  if (typeof gtag !== 'undefined') {
    gtag('event', 'cookie_consent', {
      event_category: 'legal',
      event_label: level
    });
  }

  // Hide banner
  const banner = document.getElementById('cookie-consent-banner');
  if (banner) {
    banner.style.animation = 'slideDown 0.3s ease-out forwards';
    setTimeout(() => banner.remove(), 300);
  }

  // Initialize analytics/ads based on consent
  if (level === 'all') {
    initGoogleAnalytics();
    // initAdSense() - future
    // initInfolinks() - future
  }
}

function acceptCookies() {
  setCookieConsent('all');
}

function essentialCookiesOnly() {
  setCookieConsent('essential');
}

function initGoogleAnalytics() {
  // GA4 already loaded globally
  console.log('📊 Analytics enabled (user consent)');
}

function showCookieBanner() {
  // Don't show if already consented
  if (getCookieConsent()) return;

  const banner = document.getElementById('cookie-consent-banner');
  if (!banner) return;

  // Show with animation
  banner.style.animation = 'slideUp 0.5s ease-out';
}

// CSS animation
const style = document.createElement('style');
style.textContent = `
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes slideDown {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(100%); opacity: 0; }
  }
  #cookie-consent-banner {
    transform: translateY(100%);
    opacity: 0;
    animation: slideUp 0.5s ease-out forwards;
  }
`;
document.head.appendChild(style);

// Auto-show on page load (after a brief delay)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => setTimeout(showCookieBanner, 1000));
} else {
  setTimeout(showCookieBanner, 1000);
}

// Expose functions globally
window.acceptCookies = acceptCookies;
window.essentialCookiesOnly = essentialCookiesOnly;
</script>
