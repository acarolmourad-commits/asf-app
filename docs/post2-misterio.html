<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post 2 - Manas ASF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #00A8CC 0%, #0E2439 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #00A8CC 0%, #0E7490 50%, #0E2439 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        
        .circle-bg {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        
        .circle-bg-2 {
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
        
        .content {
            position: relative;
            z-index: 2;
            padding: 80px;
        }
        
        .emoji {
            font-size: 150px;
            margin-bottom: 40px;
        }
        
        .number {
            font-size: 180px;
            font-weight: bold;
            text-shadow: 5px 5px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            background: linear-gradient(to right, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .title {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 28px;
            opacity: 0.95;
            line-height: 1.6;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .cta {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: #FFD700;
        }
        
        .logo {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 28px;
            font-weight: bold;
            opacity: 0.9;
        }
        
        .logo-emoji {
            font-size: 40px;
        }
        
        .hashtag-bar {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.15);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 850px;
        }
        
        .hashtag {
            background: rgba(255,255,255,0.25);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        @media (max-width: 1100px) {
            .post-container {
                width: 100%;
                height: auto;
                min-height: 1080px;
            }
            .emoji { font-size: 100px; }
            .number { font-size: 120px; }
            .title { font-size: 36px; }
            .subtitle { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="circle-bg"></div>
        <div class="circle-bg-2"></div>
        
        <div class="content">
            <div class="emoji">👀</div>
            <div class="number">47</div>
            <div class="title">Manas Já Sabem...</div>
            <div class="subtitle">
                E você?<br><br>
                Vai ficar de fora?<br><br>
                Algo especial está sendo criado<br>
                para nós. Para as que surfam.<br>
                Para as que amam o mar.
            </div>
            <div class="cta">Fique atenta. 🏄‍♀️</div>
        </div>
        
        <div class="hashtag-bar">
            <span class="hashtag">#surfgirl</span>
            <span class="hashtag">#surffeminino</span>
            <span class="hashtag">#manas</span>
            <span class="hashtag">#comunidade</span>
            <span class="hashtag">#womeninsport</span>
            <span class="hashtag">#asf</span>
            <span class="hashtag">#emBreve</span>
        </div>
        
        <div class="logo">
            <span class="logo-emoji">🏄‍♀️</span>
            <span>ASF</span>
        </div>
    </div>
</body>
</html>
