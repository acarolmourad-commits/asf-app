name: ASF Daily Board & Eco Agent

on:
  schedule:
    # Run daily at 7am
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Board & Eco Agent
        run: |
          python3 scripts/eco_board_agent.py >> daily_content.md
          
          # Update tips in the app
          echo "## Daily Content $(date)" >> content_log.md

      - name: Auto-commit changes
        run: |
          git config user.name "ASF Eco Agent"
          git config user.email "eco@asf.com.br"
          git add -A
          git diff --quiet --exit-code && echo "No changes to commit" && exit 0
          git commit -m "Daily eco & board content - $(date +%Y-%m-%d)"
          git push origin main || echo "No changes to push"