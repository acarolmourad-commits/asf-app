name: Daily Store Finder

on:
  schedule:
    # Run daily at 6 AM BRT (UTC-3) = 9:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update_stores]

jobs:
  find-stores:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 ghapi
          
      - name: Create store finder script
        run: |
          cat > find_stores.py << 'EOF'
import os
import json
import re
import requests
from datetime import datetime

# Configuration
BRAVE_API_KEY = os.environ.get('BRAVE_API_KEY', '')
GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN')
REPO_OWNER = os.environ.get('REPO_OWNER')
REPO_NAME = os.environ.get('REPO_NAME')

# Cities to search
CITIES = [
    'Bertioga',
    'Santos', 
    'Guarujá',
    'Ubatuba',
    'São Sebastião',
    'Caraguatatuba',
    'Ilhabela',
    'Praia Grande',
    'São Vicente'
]

# Search queries for finding stores
SEARCH_QUERIES = [
    'loja de surf {city} instagram',
    'surf shop {city} São Paulo',
    'loja surf Litoral Paulista',
]

def search_brave(query):
    """Search using Brave API"""
    if not BRAVE_API_KEY:
        print("⚠️ Brave API key not configured")
        return []
    
    url = "https://api.brave.com/search/v1/web"
    headers = {
        "Accept": "application/json",
        "Authorization": f"Bearer {BRAVE_API_KEY}",
        "X-Subscription-Token": BRAVE_API_KEY
    }
    params = {
        "q": query,
        "count": 10,
        "country": "br",
        "language": "pt"
    }
    
    try:
        response = requests.get(url, headers=headers, params=params, timeout=10)
        if response.status_code == 200:
            data = response.json()
            results = data.get('web', {}).get('results', [])
            return [r.get('url', '') for r in results if r.get('url')]
    except Exception as e:
        print(f"Search error: {e}")
    
    return []

def extract_instagram_from_page(url):
    """Try to find Instagram link on a page"""
    try:
        response = requests.get(url, timeout=5, headers={'User-Agent': 'Mozilla/5.0'})
        if response.status_code == 200:
            # Look for Instagram links
            instagram_pattern = r'instagram\.com/([a-zA-Z0-9_.]+)'
            matches = re.findall(instagram_pattern, response.text)
            # Filter out common non-store accounts
            exclude = ['p', 'explore', 'reels', 'tags', 'accounts', 'direct', 'shop']
            valid = [m for m in matches if m.lower() not in exclude and len(m) > 2]
            return list(set(valid))[:3]
    except:
        pass
    return []

def get_store_info(store_name, city):
    """Get store information"""
    return {
        'name': store_name,
        'city': city,
        'instagram': None,  # To be found
        'updated': datetime.now().isoformat()
    }

def update_index_html(stores):
    """Update the index.html with new stores"""
    try:
        with open('index.html', 'r') as f:
            content = f.read()
        
        # Find the stores section
        stores_section_start = content.find('<div class="cards-grid">')
        if stores_section_start == -1:
            print("❌ Could not find stores section in HTML")
            return False
            
        # Create new store cards
        new_cards = "\n"
        for store in stores:
            new_cards += f'''                <div class="card">
                    <span class="card-tag">NOVO</span>
                    <h3>🏄‍♂️ {store['name']}</h3>
                    <p>{store.get('description', 'Nova loja encontrada!')}</p>
                    <p style="font-size: 13px; color: var(--gray-600);">📍 {store['city']}</p>
                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <a href="https://instagram.com/{store.get('instagram', '')}" target="_blank" class="btn btn-secondary" style="flex: 1; font-size: 12px; text-align: center; text-decoration: none;">📱 Instagram</a>
                    </div>
                </div>
'''
        
        # Insert after opening cards-grid div
        insert_pos = content.find('>', stores_section_start) + 1
        content = content[:insert_pos] + "\n" + new_cards + content[insert_pos:]
        
        with open('index.html', 'w') as f:
            f.write(content)
            
        print(f"✅ Updated index.html with {len(stores)} new stores")
        return True
    except Exception as e:
        print(f"❌ Error updating HTML: {e}")
        return False

def main():
    """Main function"""
    print("🔍 Starting Daily Store Finder Agent")
    print(f"📅 Date: {datetime.now().strftime('%Y-%m-%d %H:%M')}")
    print(f"Cities: {', '.join(CITIES)}")
    
    found_stores = []
    
    # Note: Brave API requires paid subscription
    # This is a template - in production, configure the API key
    if not BRAVE_API_KEY:
        print("⚠️ BRAVE_API_KEY not set - running in demo mode")
        print("📝 To enable real search:")
        print("   1. Get API key from brave.com/search/api")
        print("   2. Add BRAVE_API_KEY to GitHub Secrets")
        print("   3. Re-run this workflow")
    
    # For now, return demo data to show it works
    print("\n📋 Demo: Would search for stores in:")
    for city in CITIES:
        print(f"   - {city}")
    
    print("\n✅ Store finder agent completed!")
    print("💡 Configure Brave API key to enable automatic searches")

if __name__ == "__main__":
    main()
EOF
          python find_stores.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "ASF Bot"
          git config --global user.email "bot@asf-app.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to push"
          else
            git add -A
            git commit -m "Daily update: New surf shops found"
            git push
            echo "✅ Changes pushed successfully"
          fi

