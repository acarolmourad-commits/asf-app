    needs: find-stores
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Create status message
        run: |
          STATUS="${{ needs.find-stores.result }}"
          if [ "$STATUS" == "success" ]; then
            echo "✅ Daily store finder completed successfully"
          else
            echo "⚠️ Store finder completed with status: $STATUS"
          fi