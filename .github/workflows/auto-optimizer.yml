name: ASF Auto Optimizer

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Link Checker
        run: |
          python3 scripts/link_checker.py >> optimization_report.md

      - name: Run Layout Optimizer
        run: |
          python3 scripts/layout_optimizer.py >> layout_report.md

      - name: Auto-commit improvements
        run: |
          git config user.name "ASF Optimizer"
          git config user.email "optimizer@asf.com.br"
          git add -A
          git diff --quiet --exit-code && echo "No changes" && exit 0
          git commit -m "Auto optimization - $(date +%Y-%m-%d\ %H:%M)" || true
          git push origin main || true
