name: ASF Auto Optimizer

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Link Checker
        run: |
          python3 scripts/link_checker.py >> optimization_report.md
          cat optimization_report.md

      - name: Check for improvements
        run: |
          echo "## Análise de Oportunidades" >> improvements.md
          echo "- Verificar links externos" >> improvements.md
          echo "- Adicionar novo conteúdo multilíngue" >> improvements.md
          echo "- Melhorar SEO do app" >> improvements.md

      - name: Create improvement branch
        run: |
          git config user.name "ASF Optimizer"
          git config user.email "optimizer@asf.com.br"
          git checkout -b improvement/$(date +%Y%m%d%H%M)
          git add -A
          git diff --quiet && exit 0
          git commit -m "Auto optimization $(date +%Y-%m-%d\ %H:%M)"
          git push origin improvement/$(date +%Y%m%d%H%M)

      - name: Create Pull Request
        if: success()
        run: |
          gh pr create --title "Auto Improvement $(date +%Y-%m-%d)" --body "Automatically generated improvements" --base main
