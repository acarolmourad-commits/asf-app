name: Daily Update

on:
  schedule:
    # Run daily at 7 AM BRT (UTC-3) = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [daily_update]

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update wave forecast
        run: |
          if [ -f scripts/wave_forecast.py ]; then
            python3 scripts/wave_forecast.py
            echo "✅ Wave forecast updated"
          else
            echo "⚠️ wave_forecast.py not found"
          fi

      - name: Check for changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "ASF Bot"
            git config user.email "bot@asf-app.com"
            git add -A
            git commit -m "Daily update - $(date +%Y-%m-%d)"
            git push
            echo "✅ Changes pushed"
          fi