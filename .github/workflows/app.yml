name: ASF App Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 7 AM BRT (UTC-3) = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

jobs:
  # ========== DEPLOY ==========
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app
        run: |
          echo "📱 ASF App Validation"
          if [ -f index.html ]; then
            LINES=$(wc -l < index.html)
            echo "✅ index.html found: $LINES lines"
          else
            echo "❌ index.html not found!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ========== WAVE FORECAST ==========
  wave-forecast:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update forecast
        run: |
          echo "🌊 Updating wave forecast..."
          if [ -f scripts/wave_forecast.py ]; then
            python3 scripts/wave_forecast.py
            echo "✅ Forecast updated"
          else
            echo "⚠️ Script not found"
          fi

      - name: Commit changes
        run: |
          git config user.name "ASF Bot"
          git config user.email "bot@asf-app.com"
          if git diff --quiet; then
            echo "No changes"
          else
            git add -A
            git commit -m "🌊 Wave forecast - $(date +%Y-%m-%d)"
            git push
            echo "✅ Changes pushed"
          fi

  # ========== DAILY TIP ==========
  daily-tip:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate tip
        run: |
          echo "🧠 Generating daily tip..."
          python3 << 'PYEOF'
import os
from datetime import datetime

tips = [
    {"cat": "🧠 Mindfulness", "title": "Respira fundo", "text": "Quando sentir medo, faça 3 respirações profundas. Inspira 4s, segura 4s, expira 6s."},
    {"cat": "🌊 Surf Mental", "title": "Uma onda de cada vez", "text": "Foque apenas na próxima onda. O presente é seu aliado."},
    {"cat": "💪 Confiança", "title": "Você sabe surfar", "text": "Lembre-se de 3 ondas que você conseguiu. Você é capaz!"},
    {"cat": "😰 Ansiedade", "title": "Olha o horizonte", "text": "Quando a ansiedade subir, olhe para o horizonte. A vista larga ajuda."},
    {"cat": "🧘 Meditação", "title": "5 minutos de paz", "text": "Senta na areia antes de surfar. Fecha os olhos. Sente o som do mar."},
    {"cat": "🌅 Motivação", "title": "Novo dia", "text": "Cada sessão é uma chance de recomeçar. O que aconteceu ontem não define hoje."},
    {"cat": "🧠 Mindfulness", "title": "Corpo presente", "text": "Sente os pés na prancha. Sente a água. Quando a mente divagar, traga para o corpo."},
]

day = datetime.now().timetuple().tm_yday
tip = tips[day % len(tips)]

html = f'''<div style="background: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%); padding: 20px; margin: 20px; border-radius: 16px; color: white;">
    <p style="font-size: 12px; opacity: 0.9;">{tip["cat"]}</p>
    <h3 style="margin: 8px 0;">{tip["title"]}</h3>
    <p style="font-size: 14px; line-height: 1.6;">{tip["text"]}</p>
    <p style="font-size: 11px; opacity: 0.8; margin-top: 12px;">⏰ Dica do Dia</p>
</div>'''

os.makedirs('docs', exist_ok=True)
with open('docs/daily-tip.html', 'w') as f:
    f.write(html)

print(f"✅ Tip: {tip['title']}")
PYEOF

      - name: Commit tip
        run: |
          git config user.name "ASF Bot"
          git config user.email "bot@asf-app.com"
          git add docs/daily-tip.html
          git commit -m "🧠 Daily tip - $(date +%Y-%m-%d)"
          git push
          echo "✅ Tip committed"

  # ========== CONTENT GEN ==========
  content-gen:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate content
        run: |
          echo "📝 Generating content..."
          if [ -f scripts/generate_content.py ]; then
            python3 scripts/generate_content.py || echo "⚠️ Script ran with warnings"
          fi

      - name: Optimize
        run: |
          if [ -f scripts/link_checker.py ]; then
            python3 scripts/link_checker.py || true
          fi

      - name: Commit
        run: |
          git config user.name "ASF Bot"
          git config user.email "bot@asf-app.com"
          if git diff --quiet; then
            echo "No changes"
          else
            git add -A
            git commit -m "📝 Auto content - $(date +%Y-%m-%d\ %H:%M)"
            git push
            echo "✅ Content pushed"
          fi