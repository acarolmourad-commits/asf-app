name: ASF App - Daily Automation

on:
  push:
    branches: [main]
  schedule:
    # Wave forecast: daily at 7 AM BRT (10:00 UTC)
    - cron: '0 10 * * *'
    # Daily tips: also daily at 7 AM BRT (10:00 UTC)
    - cron: '0 10 * * *'
    # Breathing & stretching: every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [daily_update, deploy, content_update, breathing_stretch]

# Global settings
env:
  PYTHON_VERSION: '3.11'
  GIT_AUTHOR_NAME: ASF Bot
  GIT_AUTHOR_EMAIL: bot@asf-app.com

jobs:
  # ========================================
  # DEPLOY JOB
  # ========================================
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Validate
        run: |
          if [ ! -f index.html ]; then echo "❌ index.html missing"; exit 1; fi
          echo "✅ index.html: $(wc -l < index.html) lines"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4

  # ========================================
  # WAVE FORECAST
  # ========================================
  wave-forecast:
    name: 🌊 Wave Forecast
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 🌊 Fetch wave data
        run: |
          python3 scripts/wave_forecast.py
          if [ -f docs/wave-forecast.html ]; then
            echo "✅ Forecast generated"
          else
            echo "❌ Forecast file not created"
            exit 1
          fi
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if git diff --quiet docs/wave-forecast.html; then
            echo "📭 No changes"
          else
            git add docs/wave-forecast.html
            git commit -m "🌊 Wave forecast - $(date +%Y-%m-%d)"
            git push
            echo "✅ Updated"
          fi

  # ========================================
  # DAILY TIP (Mental Wellness)
  # ========================================
  daily-tip:
    name: 🧠 Daily Mental Tip
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🧠 Generate tip
        run: |
          python3 << 'PYEOF'
import os
from datetime import datetime
TIPS = [
    {"cat": "🧠 Mindfulness", "title": "Respiração 4-7-8", "text": "Inspire 4s, segure 7s, expire 8s. Repita 3x. Acalma instantaneamente!"},
    {"cat": "🌊 Surf Mental", "title": "Uma onda de cada vez", "text": "Foque apenas na próxima onda. O presente é seu aliado."},
    {"cat": "💪 Confiança", "title": "Você sabe surfar", "text": "Lembre-se de 3 ondas que você conseguiu. Você é capaz!"},
    {"cat": "😰 Ansiedade", "title": "Olha o horizonte", "text": "Quando ansiedade subir, olhe para horizonte. A vista larga ajuda."},
    {"cat": "🧘 Meditação", "title": "5 minutos de paz", "text": "Senta na areia antes de surfar. Fecha olhos. Sente o som do mar."},
    {"cat": "🌅 Motivação", "title": "Novo dia", "text": "Cada sessão é uma chance de recomeçar. O que passou não define hoje."},
    {"cat": "🧠 Mindfulness", "title": "Corpo presente", "text": "Sente pés na prancha. Sente água. Mente divagando? Traz pro corpo."},
]
day = datetime.now().timetuple().tm_yday
tip = TIPS[day % len(TIPS)]
html = f'''<div style="background:linear-gradient(135deg,#9B59B6,#8E44AD);padding:20px;margin:20px;border-radius:16px;color:white;">
<p style="font-size:12px;opacity:0.9;">{tip['cat']}</p><h3 style="margin:8px 0;">{tip['title']}</h3><p style="font-size:14px;line-height:1.6;">{tip['text']}</p><p style="font-size:11px;opacity:0.8;margin-top:12px;">⏰ {datetime.now().strftime('%d/%m/%Y')}</p></div>'''
os.makedirs('docs', exist_ok=True)
with open('docs/daily-tip.html','w',encoding='utf-8') as f: f.write(html)
print(f"✅ Tip: {tip['title']}")
PYEOF
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          git add docs/daily-tip.html
          git commit -m "🧠 Daily tip - $(date +%Y-%m-%d)" || echo "No changes"
          git push

  # ========================================
  # RESPIRAÇÃO DICAS (New!)
  # ========================================
  respiracao:
    name: 🧘 Respiração Tips
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🧘 Generate breathing tips
        run: |
          python3 scripts/respiração_dicas.py
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if git diff --quiet docs/generated/respiracao.html; then
            echo "📭 No changes"
          else
            git add docs/generated/respiracao.html
            git commit -m "🧘 Breathing tip update - $(date +%Y-%m-%d)"
            git push
            echo "✅ Updated"
          fi

  # ========================================
  # ALONGAMENTO DICAS (New!)
  # ========================================
  alongamento:
    name: 🧘 Alongamento Tips
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🧘 Generate stretching tips
        run: |
          python3 scripts/alongamento_dicas.py
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if git diff --quiet docs/generated/alongamento.html; then
            echo "📭 No changes"
          else
            git add docs/generated/alongamento.html
            git commit -m "🧘 Stretching tip update - $(date +%Y-%m-%d)"
            git push
            echo "✅ Updated"
          fi

  # ========================================
  # CONTENT GENERATOR
  # ========================================
  content-generator:
    name: 📝 Content Generator
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 📝 Generate content
        run: |
          python3 scripts/generate_content.py
      - name: 🔍 Link check (non-fatal)
        if: always()
        run: python3 scripts/link_checker.py || true
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if ! git diff --quiet; then
            git add -A
            git commit -m "📝 Auto content - $(date +%Y-%m-%d\ %H:%M)"
            git push
          fi

  # ========================================
  # MOBILITY AGENT
  # ========================================
  mobility:
    name: 🧘 Mobility Agent
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🧘 Generate mobility
        run: python3 scripts/mobility_agent.py
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if ! git diff --quiet; then
            git add -A
            git commit -m "🧘 Mobility update - $(date +%Y-%m-%d)"
            git push
          fi

  # ========================================
  # SMART GENERATOR
  # ========================================
  smart-gen:
    name: 🤖 Smart Generator
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🤖 Generate smart
        run: python3 scripts/smart_generator.py
      - name: 💾 Commit
        if: always()
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if ! git diff --quiet; then
            git add -A
            git commit -m "🤖 Smart update - $(date +%Y-%m-%d\ %H:%M)"
            git push
          fi

  # ========================================
  # ECO BOARD AGENT
  # ========================================
  eco-board:
    name: 🌱 Eco Board Agent
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🌱 Generate eco
        run: python3 scripts/eco_board_agent.py
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if ! git diff --quiet; then
            git add -A
            git commit -m "🌱 Eco update - $(date +%Y-%m-%d)"
            git push
          fi