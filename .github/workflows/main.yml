name: ASF App - Daily Automation (Audited & Improved v2)

on:
  push:
    branches: [main]
  schedule:
    # 🌊 Wave forecast: daily at 7:00 AM BRT (10:00 UTC)
    - cron: '0 10 * * *'
    # 📝 Daily content: 8:00 AM BRT (11:00 UTC) - includes tips, breathing, stretching, mobility, etc.
    - cron: '0 11 * * *'
    # 🧘 Breathing & stretching extra: every 6h (0,6,12,18 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [daily_update, deploy, content_update, breathing_stretch]

env:
  PYTHON_VERSION: '3.11'
  GIT_AUTHOR_NAME: ASF Bot
  GIT_AUTHOR_EMAIL: bot@asf-app.com
  BOT_SIGNATURE: "🤖 ASF Automation"

jobs:
  # ========================================
  # 🌊 WAVE FORECAST (10:00 UTC daily)
  # ========================================
  wave-forecast:
    name: 🌊 Wave Forecast
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 🌊 Generate Wave Forecast
        run: |
          python3 scripts/wave_forecast.py
          echo "✅ Wave forecast generated"
      - name: ✅ Validate Output
        run: |
          if [ -f docs/wave-forecast.html ]; then
            size=$(wc -c < docs/wave-forecast.html)
            echo "✅ docs/wave-forecast.html exists ($size bytes)"
          else
            echo "❌ ERROR: docs/wave-forecast.html not created!"
            exit 1
          fi
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          if git diff --quiet docs/wave-forecast.html; then
            echo "📭 No changes in wave forecast"
          else
            git add docs/wave-forecast.html
            git commit -m "🌊 Wave forecast - $(date +%Y-%m-%d)"
            git push
            echo "✅ Updated"
          fi

  # ========================================
  # 🧘 BREATHING & STRETCHING (every 6h)
  # ========================================
  breathing-stretching:
    name: 🧘 Breathing & Stretching
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 🧘 Generate Breathing Tip
        run: |
          python3 scripts/respiracao_dicas.py
          echo "✅ Breathing tip generated"
      - name: ✅ Validate Breathing Output
        run: |
          if [ -f docs/generated/respiracao.html ]; then
            echo "✅ respiracao.html exists ($(wc -c < docs/generated/respiracao.html) bytes)"
          else
            echo "❌ ERROR: respiracao.html missing"
            exit 1
          fi
      - name: 🧘 Generate Stretching Tip
        run: |
          python3 scripts/alongamento_dicas.py
          echo "✅ Stretching tip generated"
      - name: ✅ Validate Stretching Output
        run: |
          if [ -f docs/generated/alongamento.html ]; then
            echo "✅ alongamento.html exists ($(wc -c < docs/generated/alongamento.html) bytes)"
          else
            echo "❌ ERROR: alongamento.html missing"
            exit 1
          fi
      - name: 💾 Commit
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          changed=false
          for file in docs/generated/respiracao.html docs/generated/alongamento.html; do
            if ! git diff --quiet "$file"; then
              changed=true
              echo "📝 $file changed"
            fi
          done
          if [ "$changed" = true ]; then
            git add docs/generated/respiracao.html docs/generated/alongamento.html
            git commit -m "🧘 Breathing & stretching update - $(date +%Y-%m-%d %H:%M)"
            git push
            echo "✅ Updated"
          else
            echo "📭 No changes"
          fi

  # ========================================
  # 📝 DAILY CONTENT (11:00 UTC daily)
  # ========================================
  daily-content:
    name: 📝 Daily Content Pack
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 🧠 Generate Daily Mental Tip
        run: |
          python3 scripts/daily_tip.py
      - name: ✅ Validate Daily Tip
        run: |
          if [ -f docs/daily-tip.html ]; then
            echo "✅ daily-tip.html exists"
          else
            echo "❌ daily-tip.html missing"
            exit 1
          fi
      - name: 📝 Generate Full Content (tips, quotes, posts)
        run: |
          python3 scripts/generate_content.py
      - name: ✅ Validate Full Content
        run: |
          for file in docs/generated/tip.html docs/generated/quote.html docs/generated/post.html; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
      - name: 🧘 Generate Mobility
        run: |
          python3 scripts/mobility_agent.py
      - name: ✅ Validate Mobility
        run: |
          for file in docs/generated/mobility.json docs/generated/mobility.html; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
      - name: 🤖 Generate Smart Suggestions
        run: |
          python3 scripts/smart_generator.py
      - name: ✅ Validate Smart
        run: |
          for file in docs/generated/smart.json docs/generated/smart.html; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
      - name: 🌱 Generate Eco Board
        run: |
          python3 scripts/eco_board_agent.py
      - name: ✅ Validate Eco
        run: |
          for file in docs/generated/eco-board.json docs/generated/eco-board.html; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
      - name: 🎨 Run Layout Optimizer (non-fatal)
        if: always()
        run: |
          python3 scripts/layout_optimizer.py || true
      - name: 🔍 Run Link Checker (non-fatal)
        if: always()
        run: |
          python3 scripts/link_checker.py || true
      - name: ✅ Validate Layout & Link Reports
        run: |
          for file in docs/generated/layout-report.json docs/generated/link-checker.json; do
            if [ -f "$file" ]; then
              echo "✅ $file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done
      - name: 💾 Commit All Changes
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"

          if git diff --quiet; then
            echo "📭 No changes to commit"
          else
            git add -A
            git status --short
            git commit -m "📝 Daily content update - $(date +%Y-%m-%d)"
            git push
            echo "✅ All changes committed"
          fi

  # ========================================
  # 🚀 DEPLOY (on push only)
  # ========================================
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [wave-forecast, breathing-stretching, daily-content]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Validate App Structure
        run: |
          echo "🔍 Validating app structure..."
          if [ ! -f index.html ]; then
            echo "❌ index.html missing!"
            exit 1
          fi
          lines=$(wc -l < index.html)
          echo "✅ index.html: $lines lines"

          # Check critical sections
          grep -q "Brand Hub" index.html && echo "✅ Brand Hub section found"
          grep -q "badges" index.html && echo "✅ Badges section found"
          grep -q "Comunidade ASF" index.html && echo "✅ Community section found"
          grep -q "🏆 Minhas Conquistas" index.html && echo "✅ Badges page found"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
      - name: ✅ Deployment Success
        run: |
          echo "🎉 App deployed successfully!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
