name: Content Generator

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate content
        run: |
          if [ -f scripts/generate_content.py ]; then
            python3 scripts/generate_content.py
            echo "✅ Content generated"
          else
            echo "⚠️ generate_content.py not found"
          fi

      - name: Optimize
        run: |
          if [ -f scripts/link_checker.py ]; then
            python3 scripts/link_checker.py || true
          fi

      - name: Commit changes
        run: |
          git config user.name "ASF Bot"
          git config user.email "bot@asf-app.com"
          git add -A
          git diff --quiet && echo "No changes" && exit 0
          git commit -m "Auto content update - $(date +%Y-%m-%d\ %H:%M)"
          git push
          echo "✅ Changes committed"