def get_daily_tip():
    """Get a tip based on the day of year"""
    day_of_year = datetime.now().timetuple().tm_yday
    tip_index = day_of_year % len(TIPS)
    return TIPS[tip_index]

def generate_html(tip):
    """Generate HTML card for the tip"""
    return f'''
    <div class="mental-tip" style="background: linear-gradient(135deg, #9B59B6 0%, #8E44AD 100%); padding: 20px; margin: 20px; border-radius: 16px; color: white;">
        <p style="font-size: 12px; opacity: 0.9;">{tip['category']}</p>
        <h3 style="margin: 8px 0;">{tip['title']}</h3>
        <p style="font-size: 14px; line-height: 1.6;">{tip['content']}</p>
        <p style="font-size: 11px; opacity: 0.8; margin-top: 12px;">⏰ {tip['time']}</p>
    </div>
    '''

def main():
    tip = get_daily_tip()
    today = datetime.now().strftime('%Y-%m-%d')
    
    print("🧠 Mental Wellness Daily Tip")
    print(f"📅 {today}")
    print(f"\n{ tip['category'] }")
    print(f"📝 {tip['title']}")
    print(f"💬 {tip['content']}")
    print(f"⏰ {tip['time']}")
    
    # Create tip for today
    html = generate_html(tip)
    with open('docs/daily-tip.html', 'w') as f:
        f.write(html)
    
    print("\n✅ Daily tip saved!")
    
if __name__ == "__main__":
    main()
EOF
          python mental_tips.py
          
      - name: Commit daily tip
        run: |
          git config --global user.name "ASF Bot"
          git config --global user.email "bot@asf-app.com"
          
          # Check if there are changes
          if git diff --quiet -- docs/daily-tip.html; then
            echo "No changes - same tip for today"
          else
            git add docs/daily-tip.html
            git commit -m "Daily mental wellness tip - $(date +%Y-%m-%d)"
            git push
            echo "✅ Daily tip updated and pushed"
          fi

  notify:
    needs: send-tip
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Status
        run: |
          STATUS="${{ needs.send-tip.result }}"
          if [ "$STATUS" == "success" ]; then
            echo "✅ Mental wellness tip sent successfully"
          else
            echo "⚠️ Status: $STATUS"
          fi