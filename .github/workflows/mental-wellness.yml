name: Mental Wellness Daily Tips

on:
  schedule:
    # Run daily at 7 AM BRT (UTC-3) = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [daily_tips]

jobs:
  send-tip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Create mental wellness script with 30 tips
        run: |
          cat > mental_tips.py << 'EOF'
