<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASF - Associação de Surf Feminino | App Oficial</title>
    <meta name="description" content="ASF - App completo para mulheres surfistas. Dicas, badges, metas semanais, planner de surftrips e comunidade exclusiva.">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"ASF"}</script>
    <style>
        :root{--primary:#00A8CC;--secondary:#0E2439;--accent:#F4D03F;--success:#2ECC71;--white:#fff;--light:#F8F9FA;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Outfit',sans-serif;background:var(--light);color:var(--secondary);}
        header{background:linear-gradient(135deg,var(--secondary),var(--primary));padding:20px;}
        .hero{padding:40px 20px;text-align:center;background:linear-gradient(135deg,rgba(0,168,204,0.1),rgba(244,208,63,0.1));}
        .btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--white);border:none;padding:12px 20px;border-radius:12px;cursor:pointer;margin:4px;}
        .section{padding:20px;max-width:1200px;margin:0 auto;}
        .card{background:var(--white);border-radius:16px;padding:16px;margin:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
        .badge{background:var(--accent);color:var(--secondary);padding:4px 10px;border-radius:20px;font-size:12px;margin:2px;display:inline-block;}
        .progress{background:#eee;border-radius:10px;height:20px;overflow:hidden;}
        .progress-bar{height:100%;background:var(--primary);transition:width 0.5s;}
        @media(max-width:768px){.grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <header>
        <h1 style="color:var(--white);text-align:center;font-size:24px;">🏄‍♀️ ASF APP</h1>
        <p style="color:var(--white);text-align:center;opacity:0.9;">Sistema de Pontos: <span id="points">0</span> pts</p>
    </header>
    
    <section class="hero">
        <h2 style="font-size:28px;margin-bottom:10px;">Bem-vinda, surfista!</h2>
        <p>Complete metas, ganhe badges e conecte-se com outras mulheres surfistas</p>
        <button class="btn" onclick="showSection('tips')">Dicas de Surf</button>
        <button class="btn" onclick="showSection('challenges')">Metas Semanais</button>
        <button class="btn" onclick="showSection('trips')">Surftrip Planner</button>
    </section>
    
    <section class="section" id="challenges">
        <h2>🎯 Metas Semanais</h2>
        <div id="challenges-list"></div>
    </section>
    
    <section class="section" id="tips">
        <h2>🏄‍♀️ Dicas de Surf</h2>
        <div class="grid" id="tips-grid"></div>
    </section>
    
    <section class="section" id="trips">
        <h2>🌊 Surftrip Planner</h2>
        <div class="grid" id="trips-grid"></div>
    </section>
    
    <footer style="background:var(--secondary);color:var(--white);text-align:center;padding:30px;">
        <p>🏄‍♀️ ASF - Conectando mulheres surfistas desde 2019</p>
        <button class="btn" onclick="openWhatsApp()">Entrar no Grupo WhatsApp</button>
    </footer>
    
    <script>
        let points = 0;
        const TIPS = [
            {cat:"Respiração", title:"4-7-8", text:"Inspire 4s, segure 7s, expire 8s"},
            {cat:"Alongamento", title:"Ombros", text:"10 rotações para mobilidade"},
            {cat:"Técnica", title:"Paddling", text:"Corpo reto, braços longos"},
            {cat:"Mental", title:"Visualização", text:"Visualize ondas antes de entrar"},
            {cat:"Saúde", title:"Hidratação", text:"500ml água antes de surfar"},
        ];
        
        const CHALLENGES = [
            {name:"Respiração 3x", done:false, pts:50},
            {name:"Alongamento diário", done:false, pts:30},
            {name:"3 sessões de surf", done:false, pts:100},
            {name:"Compartilhar no grupo", done:false, pts:20},
        ];
        
        const TRIPS = [
            {dest:"Fernando de Noronha", best:"Ago-Out", wave:"Morro dos Conventos"},
            {dest:"Maresias", best:"Jun-Set", wave:"Maresias"},
            {dest:"Garopaba", best:"Ago-Mar", wave:"Praia do Rosa"},
        ];
        
        function renderTips(){
            document.getElementById('tips-grid').innerHTML = TIPS.map(t=>`
                <div class="card" onclick="completeTip(this)">
                    <span style="background:${['#00A8CC','#27ae60','#9B59B6','#FF6B6B','#2980b9'][Math.floor(Math.random()*5)]};color:white;padding:2px 8px;border-radius:10px;font-size:11px;">${t.cat}</span>
                    <h3>${t.title}</h3>
                    <p>${t.text}</p>
                </div>
            `).join('');
        }
        
        function renderChallenges(){
            document.getElementById('challenges-list').innerHTML = CHALLENGES.map((c,i)=>`
                <div class="card">
                    <h3>${c.name}</h3>
                    <div class="progress"><div class="progress-bar" style="width:${c.done?100:0}%"></div></div>
                    <p>${c.pts} pts</p>
                    <button class="btn" onclick="completeChallenge(${i})">${c.done?'Feito':'Marcar'}</button>
                </div>
            `).join('');
        }
        
        function renderTrips(){
            document.getElementById('trips-grid').innerHTML = TRIPS.map(t=>`
                <div class="card">
                    <h3>📍 ${t.dest}</h3>
                    <p>Melhor época: ${t.best}</p>
                    <p>Onda: ${t.wave}</p>
                </div>
            `).join('');
        }
        
        function completeTip(el){
            el.style.opacity='0.5';
            points += 10;
            updatePoints();
        }
        
        function completeChallenge(i){
            CHALLENGES[i].done = true;
            points += CHALLENGES[i].pts;
            updatePoints();
            renderChallenges();
        }
        
        function updatePoints(){document.getElementById('points').textContent = points;}
        
        function showSection(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth'});}
        
        function openWhatsApp(){
            alert('Grupo WhatsApp: link disponível após cadastro no app');
        }
        
        document.addEventListener('DOMContentLoaded',()=>{
            renderTips();renderChallenges();renderTrips();
        });
    </script>
</body>
</html>
