<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASF - Associação de Surf Feminino</title>
    <meta http-equiv="refresh" content="2; url=https://acarolmourad-commits.github.io/asf-app/">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #00A8CC, #0E2439); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
            color: white;
            text-align: center;
        }
        h1 { font-size: 48px; margin: 0; }
        p { font-size: 18px; margin-top: 16px; opacity: 0.9; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 24px 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>🏄‍♀️</h1>
    <div class="spinner"></div>
    <p>Carregando...</p>
</body>
</html>
