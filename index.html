<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASF - Associação de Surf Feminino</title>
    <meta name="robots" content="index,follow">
    <meta name="description" content="ASF - Associação de Surf Feminino. Dicas, comunidade, previsões, treino, surftrips.">
    <meta name="theme-color" content="#00A8CC">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏄‍♀️</text></svg>">
    <style>
        :root{--primary:#00A8CC;--secondary:#0E2439;--success:#2ECC71;--white:#FFFFFF;--light:#F8F9FA;--gray:#9A9A9A;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Outfit',sans-serif;background:var(--light);color:var(--secondary);}
        header{background:linear-gradient(135deg,var(--secondary) 0%,var(--primary) 100%);padding:20px;}
        .logo{display:flex;align-items:center;gap:12px;}
        .logo-icon{width:40px;height:40px;background:var(--white);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;}
        .logo-text{color:var(--white);font-size:20px;font-weight:700;}
        .hero{padding:40px 20px;text-align:center;}
        .hero h1{font-size:32px;font-weight:800;margin-bottom:10px;}
        .hero p{color:var(--gray);margin-bottom:20px;}
        .btn{background:var(--primary);color:var(--white);border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600;}
        .section{padding:20px;}
        .card{background:var(--white);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
        @media(max-width:768px){.grid{grid-template-columns:1fr;}}
        footer{background:var(--secondary);color:var(--white);text-align:center;padding:20px;margin-top:40px;}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">🏄‍♀️</div>
            <div class="logo-text">ASF</div>
        </div>
    </header>
    
    <section class="hero">
        <h1>Conectando Mulheres Surfistas</h1>
        <p>Dicas, comunidade e surftrips</p>
        <button class="btn" onclick="showToast('Bem-vinda!')">Começar</button>
    </section>
    
    <section class="section">
        <div class="grid">
            <div class="card">
                <h3>🏄‍♀️ Dicas de Surf</h3>
                <p>Técnicas e manobras</p>
            </div>
            <div class="card">
                <h3>🌊 Previsão</h3>
                <p>Ondas e condições</p>
            </div>
        </div>
    </section>
    
    <footer>
        <p>&copy; 2024 ASF - Associação de Surf Feminino</p>
    </footer>
    
    <script>
        function showToast(msg){alert(msg);}
        console.log('ASF App carregado');
    </script>
</body>
</html>
