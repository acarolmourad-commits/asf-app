<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASF - Carregando...</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #0E2439; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; flex-direction: column; }
h1 { font-size: 40px; margin-bottom: 20px; }
p { font-size: 18px; opacity: 0.8; }
.spin { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #00A8CC; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
a { color: #00A8CC; margin-top: 20px; }
</style>
</head>
<body>
<div class="spin"></div>
<h1>🏄‍♀️ ASF</h1>
<p>Carregando...</p>
<a href="?v=1">Clique aqui se não carregar</a>
</body>
</html>
